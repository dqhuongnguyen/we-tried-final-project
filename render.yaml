# Render Blueprint — https://render.com/docs/blueprint-spec
# Secrets (add in the Render dashboard): MONGODB_URI, JWT_SECRET, SESSION_SECRET, GROQ_API_KEY

services:
  - type: web
    name: gi-smart
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "true"
